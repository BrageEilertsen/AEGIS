# One-command local bring-up of the full AEGIS stack (spec §8.1, §10 Docker Compose).
#   cd infra && cp .env.example .env   # then edit AEGIS_CHECKPOINT if needed
#   docker compose up --build
# Mounts the trained checkpoint + feature cache + data into the inference service (gitignored).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aegis
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis"]
      interval: 5s
      timeout: 3s
      retries: 10

  inference:
    build: { context: .., dockerfile: inference/Dockerfile }
    environment:
      AEGIS_CHECKPOINT: ${AEGIS_CHECKPOINT:-/data/outputs/gcn_lismall/best.pt}
      AEGIS_FEATURE_CACHE: /data/cache/features
      AEGIS_ADVERSARIAL_ARTIFACT: ${AEGIS_ADVERSARIAL_ARTIFACT:-/data/seed/demo_adversarial_artifact.json}
    volumes:
      - ../outputs:/data/outputs:ro
      - ../cache:/data/cache
      - ../data:/app/data             # raw CSV + processed graph cache for the startup rebuild
      - ../infra/seed:/data/seed:ro   # seeded demo adversarial before/after artifact
    ports: ["8000:8000"]
    healthcheck:
      # /health triggers the one-time model+graph load (~30-60s) then returns 200.
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)\" || exit 1"]
      interval: 10s
      timeout: 8s
      retries: 12
      start_period: 90s

  api:
    build: { context: ../api, dockerfile: Dockerfile }
    depends_on:
      postgres: { condition: service_healthy }
      inference: { condition: service_healthy }   # BFF seeds its dataset from inference at startup
    environment:
      AEGIS_DB_URL: jdbc:postgresql://postgres:5432/aegis
      AEGIS_DB_USER: aegis
      AEGIS_DB_PASSWORD: aegis
      AEGIS_INFERENCE_URL: http://inference:8000
    ports: ["8080:8080"]

  frontend:
    build: { context: ../frontend, dockerfile: Dockerfile }
    depends_on: [api]
    ports: ["4200:80"]
