# AEGIS — GCN smoke-test config on the SYNTHETIC IBM-AML frame (login-node CPU, no download).
# Exercises the full Phase-2 pipeline end-to-end in seconds. NOT a real experiment.
#   python ml/train.py --config experiments/gcn_synthetic.yaml \
#       --out-dir /tmp/aegis_smoke --feature-cache /tmp/aegis_feat --seed 0

config_version: 1
device: cpu                     # login node: keep it on CPU
model: gcn
arch:
  hidden_channels: 32
  num_layers: 2
  dropout: 0.5

dataset:
  name: ibm_aml
  variant: synthetic
  synthetic: true               # -> make_synthetic_aml (schema-identical, injected typologies)
  synthetic_legit: 4000
  graph: transaction_as_node
  delta_t_hours: 24
  subsample_legit: null
  max_out_per_in: 200
  graph_cache_dir: /tmp/aegis_graphcache

features:
  raw: true
  local: true
  spectral:
    laplacian_pe_k: 8           # small k for the tiny graph
    centralities: [pagerank, eigenvector]
    communities: false

split:
  type: temporal
  ratios: [0.6, 0.2, 0.2]

train:
  loss: weighted_ce
  focal_gamma: 2.0
  optimizer: adamw
  lr: 0.01
  weight_decay: 0.0005
  max_epochs: 60
  grad_clip_norm: 1.0
  early_stopping:
    monitor: val_pr_auc
    patience: 20
  lr_schedule: plateau
  lr_schedule_params: { factor: 0.5, patience: 5, min_lr: 1.0e-6 }

eval:
  min_precision: 0.9
