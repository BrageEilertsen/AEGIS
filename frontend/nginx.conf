server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Content-hashed bundles (main-USDF2VKM.js, styles-2BWKQ3QH.css) are immutable — cache hard.
    # ~* is case-insensitive so [a-z0-9] also matches Angular's uppercase base-32 hashes.
    location ~* -[a-z0-9]{8,}\.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html and the runtime env.js must NEVER be cached, so a new deploy's hashed bundle
    # names (and any API-URL change) are picked up immediately instead of serving a stale page.
    location = /index.html { add_header Cache-Control "no-cache, no-store, must-revalidate"; }
    location = /env.js     { add_header Cache-Control "no-cache, no-store, must-revalidate"; }

    # SPA fallback: unknown paths return index.html (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
