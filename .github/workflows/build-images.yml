name: build-images

# Builds the three AEGIS images on GitHub's runners (native linux/amd64, free) and publishes them
# to GHCR, so Azure Container Apps can pull them — no ACR Tasks (blocked on free subscriptions),
# no heavy local build. Runs on push and on demand.
on:
  push:
    branches: [main, claude/amazing-bohr-i5kdyw]
    paths:
      - inference/**
      - api/**
      - frontend/**
      - ml/**
      - infra/seed/**
      - .github/workflows/build-images.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: inference
            context: .
            file: inference/Dockerfile
          - name: api
            context: api
            file: api/Dockerfile
          - name: frontend
            context: frontend
            file: frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase owner for GHCR
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ env.OWNER }}/aegis-${{ matrix.name }}:latest
