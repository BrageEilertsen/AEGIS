name: test

# Runs the Spring Boot BFF test suite — unit + slice tests (surefire) AND the integration tests
# (failsafe), including the Testcontainers PostgreSQL IT, which needs Docker (available on the
# GitHub-hosted runner). This is the CI quality gate that the local `mvn test` can't fully run.
on:
  push:
    branches: [main, claude/amazing-bohr-i5kdyw]
    paths:
      - api/**
      - .github/workflows/test.yml
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build + unit + integration tests (Testcontainers)
        working-directory: api
        run: mvn -B verify
